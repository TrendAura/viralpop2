<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendaura | Viral News</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#111;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  flex-wrap:wrap;
}
.logo{font-weight:600;font-size:22px;}
nav a{
  color:white;
  margin:6px;
  cursor:pointer;
  text-decoration:none;
  font-size:14px;
}
nav a:hover{color:#00bcd4}

/* SEARCH */
.search-bar{
  text-align:center;
  padding:20px;
  background:white;
}
.search-bar input{
  width:60%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:3fr 1fr;
  gap:25px;
  padding:25px;
}

/* GRID */
#newsGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.article{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  padding-bottom:10px;
}
.article img{
  width:100%;
  height:170px;
  object-fit:cover;
}
.article h3{margin:10px 15px 5px;}
.article p{font-size:14px;color:#555; padding:0 15px;}
.article a{display:block; padding:5px 15px; color:#00bcd4; text-decoration:none;}
.article a:hover{text-decoration:underline;}

/* SIDEBAR */
.sidebar{
  background:white;
  padding:15px;
  border-radius:10px;
}

/* FOOTER */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

@media(max-width:900px){
  .container{grid-template-columns:1fr}
  .search-bar input{width:90%}
}
</style>
</head>

<body>

<header>
  <div class="logo">Trendaura</div>
  <nav>
    <a onclick="showCategory('home')">Home</a>
    <a onclick="showCategory('celebrities')">Celebrities</a>
    <a onclick="showCategory('tiktok')">TikTok</a>
    <a onclick="showCategory('fashion')">Fashion</a>
    <a onclick="showCategory('crypto')">Crypto</a>
    <a onclick="showCategory('technology')">Technology</a>
    <a onclick="showCategory('finance')">Finance</a>
    <a onclick="showCategory('health')">Health</a>
    <a onclick="showCategory('lifestyle')">Lifestyle</a>
  </nav>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search news...">
</div>

<div class="container">
  <div id="newsGrid"></div>
  <div class="sidebar">
    <h3>🔥 Trending Topics</h3>
    <div onclick="showCategory('celebrity breakups')">Celebrity Breakups</div>
    <div onclick="showCategory('tiktok challenges')">TikTok Challenges</div>
    <div onclick="showCategory('crypto markets')">Crypto Markets</div>
    <div onclick="showCategory('fashion models')">Fashion Models</div>
    <div onclick="showCategory('ai technology')">AI Technology</div>
  </div>
</div>

<footer>
  © 2026 Trendaura
</footer>

<script>
// --- Local posts ---
const posts = [
  {title:"📱 New TikTok Trend Taking Over", text:"A new challenge is spreading across social media.", img:"https://picsum.photos/400/200?1", category:"tiktok", url:"https://www.tiktok.com"},
  {title:"⭐ Celebrity Breakup Shocks Fans", text:"Fans react to shocking celebrity relationship news.", img:"https://picsum.photos/400/200?2", category:"celebrity", url:"https://www.tmz.com"},
  {title:"🎬 New Movie Trailer Trends Worldwide", text:"A blockbuster trailer dominates social media.", img:"https://picsum.photos/400/200?3", category:"entertainment", url:"https://www.imdb.com"},
  {title:"🎵 Viral Song Breaks Streaming Records", text:"A new song is dominating TikTok and Spotify.", img:"https://picsum.photos/400/200?4", category:"music", url:"https://www.spotify.com"}
];

const newsGrid = document.getElementById("newsGrid");

// Render initial posts
posts.forEach(post => {
  newsGrid.innerHTML += `
    <div class="article">
      <img src="${post.img}" alt="">
      <h3>${post.title}</h3>
      <p>${post.text}</p>
      <a href="${post.url}" target="_blank">Read More</a>
    </div>
  `;
});

// Fetch external articles
fetch("/articles")
  .then(res => res.json())
  .then(data => {
    data.forEach(article => {
      const card = document.createElement("div");
      card.classList.add("article");
      card.innerHTML = `
        <img src="${article.image}" alt="">
        <h3>${article.title}</h3>
        <p>${article.content.substring(0,100)}...</p>
        <a href="article.html?id=${article.id}" target="_blank">Read More</a>
      `;
      newsGrid.appendChild(card);
    });
  })
  .catch(err => console.error("Failed to fetch articles:", err));

// Dark mode toggle
function toggleDark(){ document.body.classList.toggle("dark"); }

// --- Category Mapping ---
const categoryMap = {
  "home":"all","celebrities":"celebrity","tiktok":"tiktok",
  "fashion":"fashion","crypto":"crypto","technology":"technology",
  "finance":"finance","health":"health","lifestyle":"lifestyle",
  "celebrity breakups":"celebrity","tiktok challenges":"tiktok",
  "crypto markets":"crypto","fashion models":"fashion","ai technology":"technology",
  "movies":"entertainment","music":"music"
};

// Filter by category
function showCategory(label){
  const category = categoryMap[label.toLowerCase()] || "all";

  // Filter local posts
  const filteredLocal = (category === "all") ? posts : posts.filter(p => p.category.toLowerCase()===category.toLowerCase());

  // Clear container
  newsGrid.innerHTML = "";

  // Display local posts
  filteredLocal.forEach(post => {
    newsGrid.innerHTML += `
      <div class="article">
        <img src="${post.img}" alt="">
        <h3>${post.title}</h3>
        <p>${post.text}</p>
        <a href="${post.url}" target="_blank">Read More</a>
      </div>
    `;
  });

  // Display API articles
  fetch("/articles")
    .then(res => res.json())
    .then(data => {
      data.filter(a => category==="all" || a.category.toLowerCase()===category.toLowerCase())
          .forEach(article => {
            const card = document.createElement("div");
            card.classList.add("article");
            card.innerHTML = `
              <img src="${article.image}" alt="">
              <h3>${article.title}</h3>
              <p>${article.content.substring(0,100)}...</p>
              <a href="article.html?id=${article.id}" target="_blank">Read More</a>
            `;
            newsGrid.appendChild(card);
          });
    }).catch(err=>console.error("Failed to fetch articles:", err));
}

// --- Search ---
document.getElementById("searchInput").addEventListener("input", function(){
  const keyword = this.value.toLowerCase();
  const filtered = posts.filter(p=>p.title.toLowerCase().includes(keyword)||p.text.toLowerCase().includes(keyword));
  newsGrid.innerHTML = "";
  filtered.forEach(post=>{
    newsGrid.innerHTML += `
      <div class="article">
        <img src="${post.img}" alt="">
        <h3>${post.title}</h3>
        <p>${post.text}</p>
        <a href="${post.url}" target="_blank">Read More</a>
      </div>
    `;
  });
});
</script>

</body>
</html>
