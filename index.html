<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendaura News</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

/* News grid */
#news-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 20px;
    margin-top: 20px;
}

/* News card */
.news-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.news-card img {
    width: 100%;
    border-radius: 8px;
}

.news-card a {
    text-decoration: none;
    color: blue;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Latest News</h1>

<!-- IMPORTANT CONTAINER -->
<div id="news-container">Loading news...</div>

<script>
async function loadNews() {

    const container = document.getElementById("news-container");

    try {
        const response = await fetch(
            "https://api.spaceflightnewsapi.net/v4/articles/"
        );

        const data = await response.json();

        container.innerHTML = ""; // remove loading text

        data.results.slice(0,6).forEach(article => {

            const card = document.createElement("div");
            card.className = "news-card";

            card.innerHTML = `
                <img src="${article.image_url}" alt="news image">
                <h3>${article.title}</h3>
                <p>${article.summary.substring(0,120)}...</p>
                <a href="${article.url}" target="_blank">Read Full Article</a>
            `;

            container.appendChild(card);
        });

    } catch (error) {
        container.innerHTML = "Failed to load news.";
        console.error("Error:", error);
    }
}

loadNews();
</script>

</body>
</html>
