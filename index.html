<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendaura | Viral News</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f5f5;}
header{background:#111;color:white;display:flex;justify-content:space-between;padding:15px 25px;flex-wrap:wrap;}
.logo{font-weight:600;font-size:22px;}
nav a{color:white;margin:6px;cursor:pointer;text-decoration:none;font-size:14px;}
nav a:hover{color:#00bcd4;}
.search-bar{text-align:center;padding:20px;background:white;}
.search-bar input{width:60%;padding:10px;border-radius:6px;border:1px solid #ccc;}
.container{display:grid;grid-template-columns:3fr 1fr;gap:25px;padding:25px;}
#news-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card img{width:100%;height:170px;object-fit:cover;}
.card-content{padding:15px;}
.card h3{margin:0 0 10px;}
.card p{font-size:14px;color:#555;}
.sidebar{background:white;padding:15px;border-radius:10px;}
footer{background:#111;color:white;text-align:center;padding:20px;}
@media(max-width:900px){.container{grid-template-columns:1fr}.search-bar input{width:90%}}
</style>
</head>
<body>

<header>
<div class="logo">Trendaura</div>
<nav>
<a onclick="showCategory('all')">Home</a>
<a onclick="showCategory('celebrity')">Celebrities</a>
<a onclick="showCategory('tiktok')">TikTok</a>
<a onclick="showCategory('fashion')">Fashion</a>
<a onclick="showCategory('crypto')">Crypto</a>
<a onclick="showCategory('technology')">Technology</a>
<a onclick="showCategory('finance')">Finance</a>
<a onclick="showCategory('health')">Health</a>
<a onclick="showCategory('lifestyle')">Lifestyle</a>
</nav>
</header>

<div class="search-bar">
<input type="text" id="searchInput" placeholder="Search news...">
</div>

<div class="container">
<div id="news-container"></div>

<div class="sidebar">
<h3>🔥 Trending Topics</h3>
<div>Celebrity Breakups</div>
<div>TikTok Challenges</div>
<div>Crypto Markets</div>
<div>Fashion Models</div>
<div>AI Technology</div>
</div>
</div>

<footer>
© 2026 Trendaura
</footer>

<script>
/* ---------- STATIC FALLBACK ARTICLES ---------- */
const fallbackArticles = [
  {title:"Celebrity Breakup Shocks Fans",category:"celebrity",image:"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e",text:"Fans react to a shocking celebrity breakup trending online."},
  {title:"New TikTok Dance Challenge Goes Viral",category:"tiktok",image:"https://images.unsplash.com/photo-1605810230434-7631ac76ec81",text:"Millions join a viral TikTok dance trend."},
  {title:"Fashion Models Take Over Paris",category:"fashion",image:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d",text:"Paris fashion week highlights stunning runway looks."},
  {title:"Bitcoin Surges Again",category:"crypto",image:"https://images.unsplash.com/photo-1621761191319-c6fb62004040",text:"Crypto markets surge as Bitcoin rises."},
  {title:"AI Technology Changing the World",category:"technology",image:"https://images.unsplash.com/photo-1518770660439-4636190af475",text:"Artificial intelligence continues to disrupt industries."},
  {title:"Finance Tips for 2026",category:"finance",image:"https://images.unsplash.com/photo-1554224155-6726b3ff858f",text:"Experts share smart money strategies."},
  {title:"Healthy Lifestyle Trends",category:"health",image:"https://images.unsplash.com/photo-1490645935967-10de6ba17061",text:"Nutrition and wellness trends growing worldwide."},
  {title:"Luxury Lifestyle Rising",category:"lifestyle",image:"https://images.unsplash.com/photo-1506744038136-46273834b3fb",text:"Luxury travel and lifestyle trends increase."}
];

/* ---------- DISPLAY FUNCTION ---------- */
function displayArticles(data){
  const container = document.getElementById("news-container");
  container.innerHTML = "";
  data.forEach((a)=>{
    container.innerHTML += `
      <div class="card">
        <img src="${a.urlToImage || a.image || 'https://via.placeholder.com/400x200?text=No+Image'}">
        <div class="card-content">
          <h3>${a.title}</h3>
          <p>${a.description || a.text}</p>
          <a href="${a.url || '#'}" target="_blank">Read More</a>
        </div>
      </div>
    `;
  });
}

/* ---------- NEWS API SETUP ---------- */
const apiKey = "89a3ba312d4b429d9740e60acb7e5b69"; // use one of your API keys
const apiBase = "https://newsapi.org/v2/top-headlines?country=us&pageSize=20&apiKey=" + apiKey;

let currentArticles = []; // stores the latest articles (API or fallback)

/* ---------- LOAD NEWS FUNCTION ---------- */
async function loadNews(category="general"){
  try {
    let url = apiBase;
    if(category && category !== "general" && category !== "all") url += `&category=${category}`;
    const response = await fetch(url);
    const data = await response.json();
    if(data.articles && data.articles.length > 0){
      currentArticles = data.articles;
      displayArticles(currentArticles);
    } else {
      console.log("API returned no articles, using fallback.");
      currentArticles = fallbackArticles;
      displayArticles(currentArticles);
    }
  } catch(err){
    console.error("API fetch failed, using fallback:", err);
    currentArticles = fallbackArticles;
    displayArticles(currentArticles);
  }
}

/* ---------- CATEGORY FILTER ---------- */
function showCategory(category){
  if(category==="all") category="general";
  loadNews(category);
}

/* ---------- SEARCH FUNCTION ---------- */
document.getElementById("searchInput").addEventListener("input", function(){
  const keyword = this.value.toLowerCase();
  const filtered = currentArticles.filter(a => 
    (a.title.toLowerCase().includes(keyword) || (a.text || a.description || "").toLowerCase().includes(keyword))
  );
  displayArticles(filtered);
});

/* ---------- INITIAL LOAD ---------- */
loadNews();
</script>

</body>
</html>
