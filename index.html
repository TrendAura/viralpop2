<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trendaura | Viral & Trending News</title>

<meta name="description" content="Trendaura delivers trending viral news, entertainment and technology stories worldwide.">
<meta name="keywords" content="viral news, trending news, technology, entertainment">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#f4f4f4;
    margin:0;
}

/* HEADER */
header{
    background:#111;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    margin:0;
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-weight:600;
}

nav a:hover{
    color:#00bcd4;
}

/* MAIN */
main{
    padding:20px;
}

.section-title{
    text-align:center;
    margin-top:10px;
}

/* NEWS GRID */
#news-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    margin-top:25px;
}

/* CARD DESIGN */
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin:0 0 10px;
    font-size:18px;
}

.card p{
    color:#555;
    font-size:14px;
}

.card a{
    text-decoration:none;
    color:#2196f3;
    font-weight:bold;
}

/* FOOTER */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

/* MOBILE */
@media(max-width:600px){
    header{
        flex-direction:column;
        text-align:center;
    }

    nav{
        margin-top:10px;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<h1>Trendaura</h1>

<nav>
<a href="#">Home</a>
<a href="#">Trending</a>
<a href="#">Technology</a>
<a href="#">Entertainment</a>
<a href="#">Contact</a>
</nav>
</header>

<main>

<h2 class="section-title">🔥 Latest News</h2>

<div id="news-container">Loading latest news...</div>

</main>

<!-- FOOTER -->
<footer>
<p>© 2026 Trendaura | Viral News & Trending Stories</p>
</footer>

<script>

fetch("https://api.spaceflightnewsapi.net/v4/articles/")
.then(response => response.json())
.then(data => {

    const container = document.getElementById("news-container");
    container.innerHTML = "";

    data.results.slice(0,6).forEach(article => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${article.image_url}" alt="news image">
            <div class="card-content">
                <h3>${article.title}</h3>
                <p>${article.summary.substring(0,120)}...</p>
                <a href="${article.url}" target="_blank">Read More →</a>
            </div>
        `;

        container.appendChild(div);
    });

})
.catch(error => {
    document.getElementById("news-container").innerText =
    "Failed to load news. Please refresh.";
    console.log(error);
});

</script>

</body>
</html>
