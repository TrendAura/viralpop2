<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendaura | Viral News</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#111;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  flex-wrap:wrap;
}
.logo{font-weight:600;font-size:22px;}
nav a{
  color:white;
  margin:6px;
  cursor:pointer;
  text-decoration:none;
  font-size:14px;
}
nav a:hover{color:#00bcd4}

/* SEARCH */
.search-bar{
  text-align:center;
  padding:20px;
  background:white;
}
.search-bar input{
  width:60%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:3fr 1fr;
  gap:25px;
  padding:25px;
}

/* GRID */
#news-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}
.card-content{padding:15px;}
.card h3{margin:0 0 10px;}
.card p{font-size:14px;color:#555}

/* SIDEBAR */
.sidebar{
  background:white;
  padding:15px;
  border-radius:10px;
}

/* FOOTER */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

/* ADD NEWS POST SECTION */
#add-post-container{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:25px;
}
.post {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 15px;
  max-width: 600px;
}
.post img {
  max-width: 100%;
  height: auto;
}

@media(max-width:900px){
  .container{grid-template-columns:1fr}
  .search-bar input{width:90%}
}
</style>
</head>

<body>

<header>
  <div class="logo">Trendaura</div>
  <nav>
    <a onclick="showCategory('all')">Home</a>
    <a onclick="showCategory('celebrity')">Celebrities</a>
    <a onclick="showCategory('tiktok')">TikTok</a>
    <a onclick="showCategory('fashion')">Fashion</a>
    <a onclick="showCategory('crypto')">Crypto</a>
    <a onclick="showCategory('technology')">Technology</a>
    <a onclick="showCategory('finance')">Finance</a>
    <a onclick="showCategory('health')">Health</a>
    <a onclick="showCategory('lifestyle')">Lifestyle</a>
  </nav>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search news...">
</div>

<div class="container">

  <div>
    <!-- Add News Post Section -->
    <div id="add-post-container">
      <h2>Add News Article</h2>
      <input type="text" id="title" placeholder="Title"><br><br>
      <input type="text" id="imageUrl" placeholder="Image URL"><br><br>
      <textarea id="articleText" placeholder="Article text"></textarea><br><br>
      <button id="addPostBtn">Add Post</button>
    </div>

    <!-- News Articles -->
    <div id="news-container"></div>

    <!-- Dynamically added posts will also appear below -->
    <div id="postsContainer"></div>
  </div>

  <div class="sidebar">
    <h3>🔥 Trending Topics</h3>
    <div>Celebrity Breakups</div>
    <div>TikTok Challenges</div>
    <div>Crypto Markets</div>
    <div>Fashion Models</div>
    <div>AI Technology</div>
  </div>

</div>

<footer>
© 2026 Trendaura
</footer>

<script>
/* SAMPLE ARTICLES FOR ALL CATEGORIES */
let articles=[
  {title:"Celebrity Breakup Shocks Fans",category:"celebrity",image:"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e",text:"Fans react to a shocking celebrity breakup trending online."},
  {title:"New TikTok Dance Challenge Goes Viral",category:"tiktok",image:"https://images.unsplash.com/photo-1605810230434-7631ac76ec81",text:"Millions join a viral TikTok dance trend."},
  {title:"Fashion Models Take Over Paris",category:"fashion",image:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d",text:"Paris fashion week highlights stunning runway looks."},
  {title:"Bitcoin Surges Again",category:"crypto",image:"https://images.unsplash.com/photo-1621761191319-c6fb62004040",text:"Crypto markets surge as Bitcoin rises."},
  {title:"AI Technology Changing the World",category:"technology",image:"https://images.unsplash.com/photo-1518770660439-4636190af475",text:"Artificial intelligence continues to disrupt industries."},
  {title:"Finance Tips for 2026",category:"finance",image:"https://images.unsplash.com/photo-1554224155-6726b3ff858f",text:"Experts share smart money strategies."},
  {title:"Healthy Lifestyle Trends",category:"health",image:"https://images.unsplash.com/photo-1490645935967-10de6ba17061",text:"Nutrition and wellness trends growing worldwide."},
  {title:"Luxury Lifestyle Rising",category:"lifestyle",image:"https://images.unsplash.com/photo-1506744038136-46273834b3fb",text:"Luxury travel and lifestyle trends increase."}
];

/* DISPLAY ARTICLES */
function displayArticles(data){
  const container=document.getElementById("news-container");
  container.innerHTML="";
  data.forEach((a,index)=>{
    container.innerHTML+=`
      <div class="card">
        <img src="${a.image}">
        <div class="card-content">
          <h3>${a.title}</h3>
          <p>${a.text}</p>
          <a href="article.html?id=${index}">Read More</a>
        </div>
      </div>
    `;
  });
}
displayArticles(articles);

/* CATEGORY FILTER */
function showCategory(category){
  if(category==="all"){ displayArticles(articles); return; }
  const filtered=articles.filter(a=>a.category===category);
  displayArticles(filtered);
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",function(){
  const keyword=this.value.toLowerCase();
  const filtered=articles.filter(a=> a.title.toLowerCase().includes(keyword) || a.text.toLowerCase().includes(keyword));
  displayArticles(filtered);
});

/* ADD NEWS POSTS */
const posts = [];
document.getElementById('addPostBtn').addEventListener('click', () => {
  const title = document.getElementById('title').value.trim();
  const imageUrl = document.getElementById('imageUrl').value.trim();
  const articleText = document.getElementById('articleText').value.trim();
  if (!title || !articleText) { alert('Please enter both a title and article text.'); return; }

  const post = {title,imageUrl,articleText};
  posts.push(post);
  renderPosts();
  document.getElementById('title').value='';
  document.getElementById('imageUrl').value='';
  document.getElementById('articleText').value='';
});

function renderPosts() {
  const container = document.getElementById('postsContainer');
  container.innerHTML='';
  posts.forEach(post => {
    const postDiv = document.createElement('div');
    postDiv.className='post';
    let imgHTML = post.imageUrl ? `<img src="${post.imageUrl}" alt="Post image">` : '';
    postDiv.innerHTML=`<h3>${post.title}</h3>${imgHTML}<p>${post.articleText}</p>`;
    container.appendChild(postDiv);
  });
}
</script>

</body>
</html>
