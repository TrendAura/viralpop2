<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendaura News</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

#news-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
}
</style>
</head>

<body>

<h1>Latest News</h1>

<div id="news-container">Loading news...</div>

<script>

fetch("https://api.spaceflightnewsapi.net/v4/articles/")
.then(response => response.json())
.then(data => {

    const container = document.getElementById("news-container");
    container.innerHTML = "";

    data.results.slice(0,5).forEach(article => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
        <img src="${article.image_url}">
        <h3>${article.title}</h3>
        <p>${article.summary.substring(0,100)}...</p>
        <a href="${article.url}" target="_blank">Read more</a>
        `;

        container.appendChild(div);

    });

})
.catch(error => {
    document.getElementById("news-container").innerText = "Failed to load news";
    console.log(error);
});

</script>

</body>
</html>
