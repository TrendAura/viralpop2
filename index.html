```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trendaura | Viral & Trending News</title>

<meta name="description" content="Trendaura delivers trending celebrity news, viral internet stories, tech updates, crypto news and lifestyle content.">

<!-- SEO -->
<meta name="keywords" content="celebrity news, viral news, trending news, crypto news, tech news, tiktok trends">
<meta name="author" content="Trendaura">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f5f5;
}

/* HEADER */

header{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
flex-wrap:wrap;
}

.logo{
font-size:22px;
font-weight:600;
}

/* NAV */

nav{
display:flex;
flex-wrap:wrap;
}

nav a{
color:white;
margin:6px;
text-decoration:none;
font-weight:500;
cursor:pointer;
}

nav a:hover{
color:#00bcd4;
}

/* SEARCH */

.search-bar{
text-align:center;
padding:20px;
background:white;
}

.search-bar input{
width:60%;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

/* LAYOUT */

.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:25px;
padding:25px;
}

/* NEWS GRID */

#news-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h3{
margin:0 0 10px;
font-size:18px;
}

.card p{
font-size:14px;
color:#555;
}

.card a{
text-decoration:none;
color:#2196f3;
font-weight:bold;
}

/* SIDEBAR */

.sidebar{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.trend{
margin-bottom:10px;
border-bottom:1px solid #eee;
padding-bottom:6px;
font-size:14px;
}

/* VIDEO */

iframe{
width:100%;
border:none;
border-radius:10px;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}

/* DARK MODE */

.dark{
background:#121212;
color:white;
}

/* MOBILE */

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

.search-bar input{
width:90%;
}

}

</style>
</head>

<body>

<header>

<div class="logo">Trendaura</div>

<nav>
<a onclick="loadCategory('all')">Home</a>
<a onclick="loadCategory('celebrity')">Celebrities</a>
<a onclick="loadCategory('tiktok')">TikTok</a>
<a onclick="loadCategory('fashion')">Fashion</a>
<a onclick="loadCategory('technology')">Technology</a>
<a onclick="loadCategory('crypto')">Crypto</a>
<a onclick="loadCategory('finance')">Finance</a>
<a onclick="loadCategory('health')">Health</a>
<a onclick="loadCategory('law')">Law</a>
<a onclick="toggleDark()">🌙</a>
</nav>

</header>

<div class="search-bar">
<input type="text" id="searchInput" placeholder="Search articles...">
</div>

<div class="container">

<div id="news-container">Loading news...</div>

<div class="sidebar">

<h3>🔥 Trending</h3>

<div class="trend">Celebrity Breakups</div>
<div class="trend">TikTok Challenges</div>
<div class="trend">Crypto Market</div>
<div class="trend">AI Technology</div>
<div class="trend">Fashion Models</div>

<h3>📺 Trending Video</h3>

<iframe height="200"
src="https://www.youtube.com/embed/3JZ_D3ELwOQ"
allowfullscreen></iframe>

</div>

</div>

<footer>
<p>© 2026 Trendaura | Viral News Platform</p>
</footer>

<script>

/* STORE ARTICLES */

let articlesData=[];

/* LOAD MULTIPLE NEWS SOURCES */

function loadNews(){

Promise.all([

fetch("https://api.spaceflightnewsapi.net/v4/articles/").then(r=>r.json()),
fetch("https://api.spaceflightnewsapi.net/v4/blogs/").then(r=>r.json())

])
.then(results=>{

articlesData=[...results[0].results,...results[1].results];

displayArticles(articlesData);

})
.catch(()=>{

document.getElementById("news-container").innerText="Failed to load news";

});

}

loadNews();

/* DISPLAY ARTICLES */

function displayArticles(articles){

const container=document.getElementById("news-container");

container.innerHTML="";

articles.slice(0,12).forEach(article=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
<img src="${article.image_url}">
<div class="card-content">
<h3>${article.title}</h3>
<p>${article.summary.substring(0,120)}...</p>
<a href="${article.url}" target="_blank">Read More</a>
</div>
`;

container.appendChild(div);

});

}

/* SEARCH */

document.getElementById("searchInput").addEventListener("input",function(){

const keyword=this.value.toLowerCase();

const filtered=articlesData.filter(article =>
article.title.toLowerCase().includes(keyword)
);

displayArticles(filtered);

});

/* CATEGORY FILTER */

function loadCategory(category){

if(category==="all"){
displayArticles(articlesData);
return;
}

const filtered=articlesData.filter(article =>
article.title.toLowerCase().includes(category)
);

displayArticles(filtered);

}

/* DARK MODE */

function toggleDark(){
document.body.classList.toggle("dark");
}

/* AUTO REFRESH NEWS */

setInterval(loadNews,3600000);

/* REFRESH VIDEO EVERY 30 MINUTES */

setInterval(()=>{

document.querySelector("iframe").src=
"https://www.youtube.com/embed/"+Math.random().toString(36).substring(7);

},1800000);

</script>

</body>
</html>
