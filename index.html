<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendaura | Viral News</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
/* Base styles */
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f5f5;transition:background 0.3s,color 0.3s;}
body.dark{background:#121212;color:white;}
header{background:#111;color:white;display:flex;justify-content:space-between;padding:15px 25px;flex-wrap:wrap;}
.logo{font-weight:600;font-size:22px;}
nav a{color:white;margin:6px;cursor:pointer;text-decoration:none;font-size:14px;}
nav a:hover{color:#00bcd4;}
.search-bar{text-align:center;padding:20px;background:white;}
.search-bar input{width:60%;padding:10px;border-radius:6px;border:1px solid #ccc;}
.container{display:grid;grid-template-columns:3fr 1fr;gap:25px;padding:25px;}
#newsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.article{background:white;border-radius:10px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);transition:transform 0.2s,box-shadow 0.2s;}
.article:hover{transform:translateY(-5px);box-shadow:0 6px 15px rgba(0,0,0,0.15);}
.article img{width:100%;height:170px;object-fit:cover;}
.article h3{margin:0 0 10px;}
.article p{font-size:14px;color:#555;}
.article a{display:inline-block;margin-top:10px;color:white;background:#00bcd4;padding:8px 12px;border-radius:4px;text-decoration:none;transition:background 0.2s;}
.article a:hover{background:#0097a7;}
.sidebar{background:white;padding:15px;border-radius:10px;}
.sidebar div{cursor:pointer;margin:6px 0;transition:color 0.2s;}
.sidebar div:hover{color:#00bcd4;}
.active-category{color:#00bcd4;font-weight:600;}
footer{background:#111;color:white;text-align:center;padding:20px;}
@media(max-width:900px){.container{grid-template-columns:1fr}.search-bar input{width:90%}}
</style>
</head>
<body>

<header>
<div class="logo">Trendaura</div>
<nav>
<a onclick="showCategory('all')">Home</a>
<a onclick="showCategory('celebrity')">Celebrities</a>
<a onclick="showCategory('tiktok')">TikTok</a>
<a onclick="showCategory('fashion')">Fashion</a>
<a onclick="showCategory('crypto')">Crypto</a>
<a onclick="showCategory('technology')">Technology</a>
<a onclick="showCategory('finance')">Finance</a>
<a onclick="showCategory('health')">Health</a>
<a onclick="showCategory('lifestyle')">Lifestyle</a>
</nav>
</header>

<div class="search-bar">
<input type="text" id="searchInput" placeholder="Search news...">
<button onclick="toggleDark()">🌓 Dark Mode</button>
</div>

<div class="container">
<div id="newsGrid"></div>

<div class="sidebar">
<h3>🔥 Trending Topics</h3>
<div onclick="showCategory('celebrity')">Celebrity Breakups</div>
<div onclick="showCategory('tiktok')">TikTok Challenges</div>
<div onclick="showCategory('crypto')">Crypto Markets</div>
<div onclick="showCategory('fashion')">Fashion Models</div>
<div onclick="showCategory('technology')">AI Technology</div>
</div>
</div>

<footer>
© 2026 Trendaura
</footer>

<script>
// Local static posts
const posts = [
  {title:"📱 New TikTok Trend Taking Over",text:"A new challenge is spreading across social media.",img:"https://picsum.photos/400/200?1",category:"tiktok",url:"https://www.tiktok.com/"},
  {title:"⭐ Celebrity Breakup Shocks Fans",text:"Fans react to shocking celebrity relationship news.",img:"https://picsum.photos/400/200?2",category:"celebrity",url:"https://www.tmz.com/"},
  {title:"🎬 New Movie Trailer Trends Worldwide",text:"A blockbuster trailer dominates social media.",img:"https://picsum.photos/400/200?3",category:"entertainment",url:"https://www.imdb.com/"},
  {title:"🎵 Viral Song Breaks Streaming Records",text:"A new song is dominating TikTok and Spotify.",img:"https://picsum.photos/400/200?4",category:"music",url:"https://www.spotify.com/"}
];

let currentArticles = [...posts]; // start with local posts

const newsGrid = document.getElementById("newsGrid");

// Render articles
function displayArticles(data){
  newsGrid.innerHTML = "";
  data.forEach(a => {
    const article = document.createElement("div");
    article.classList.add("article");
    article.innerHTML = `
      <img src="${a.img || a.image}" alt="">
      <h3>${a.title}</h3>
      <p>${a.text || a.content.substring(0,100)+'...'}</p>
      <a href="${a.url || "article.html?id="+a.id}" target="_blank">Read More</a>
    `;
    newsGrid.appendChild(article);
  });
}

// Fetch external articles from /articles
fetch("/articles")
  .then(res => res.json())
  .then(data => {
    currentArticles = currentArticles.concat(data); // merge with local posts
    displayArticles(currentArticles);
  })
  .catch(err => console.warn("Failed to fetch /articles:", err));

// Filter by category
function showCategory(category){
  if(category==="all"){
    currentArticles = [...posts];
  }
  const filtered = currentArticles.filter(a => a.category===category || category==="all");
  displayArticles(filtered);
  highlightActive(category);
}

// Highlight active top nav and trending topic
function highlightActive(category){
  // Top nav
  document.querySelectorAll('nav a').forEach(a=>{
    if(a.textContent.toLowerCase()===category.toLowerCase() || (category==="all" && a.textContent==="Home")){
      a.classList.add('active-category');
    } else { a.classList.remove('active-category'); }
  });
  // Sidebar
  document.querySelectorAll('.sidebar div').forEach(div=>{
    if(div.textContent.toLowerCase().includes(category.toLowerCase())){
      div.classList.add('active-category');
    } else { div.classList.remove('active-category'); }
  });
}

// Search
document.getElementById("searchInput").addEventListener("input", function(){
  const keyword = this.value.toLowerCase();
  const filtered = currentArticles.filter(a =>
    (a.title && a.title.toLowerCase().includes(keyword)) ||
    (a.text && a.text.toLowerCase().includes(keyword))
  );
  displayArticles(filtered);
});

// Dark mode toggle
function toggleDark(){ document.body.classList.toggle("dark"); }

// Initial display
displayArticles(currentArticles);
highlightActive('all');
</script>

</body>
</html>
